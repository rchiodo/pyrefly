name: Primer Comparison

on:
  workflow_dispatch:
    inputs:
      projects:
        description: 'Comma-separated project names to run (empty = all). See scripts/projects.py for valid names.'
        required: false
        default: ''
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'

permissions: {}

jobs:
  primer:
    name: Primer shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-01-18

      - name: Install type checkers
        run: pip install pyright mypy

      - name: Build pyrefly
        run: |
          cargo build --release --manifest-path pyrefly/Cargo.toml
          echo "Built pyrefly binary at $(pwd)/target/release/pyrefly"
          ./target/release/pyrefly --version

      - name: Run primer shard ${{ matrix.shard }}/4
        working-directory: scripts
        env:
          INPUT_PROJECTS: ${{ inputs.projects }}
        run: |
          echo "=== Starting primer shard ${{ matrix.shard }}/4 ==="
          PROJECT_FLAG=""
          if [ -n "$INPUT_PROJECTS" ]; then
            PROJECT_FLAG="-k $(echo "$INPUT_PROJECTS" | tr ',' ' ')"
          fi
          python3 compare_typecheckers.py \
            --pyrefly ../target/release/pyrefly \
            --cache-dir /tmp/primer_cache \
            --output-json /tmp/primer_shard_${{ matrix.shard }}.json \
            --shard-index ${{ matrix.shard }} \
            --num-shards 4 \
            $PROJECT_FLAG \
            2>&1 | tee /tmp/primer_log_${{ matrix.shard }}.txt
          echo "=== Shard ${{ matrix.shard }} complete ==="
          echo "Output size: $(du -h /tmp/primer_shard_${{ matrix.shard }}.json | cut -f1)"

      - name: Upload shard results
        uses: actions/upload-artifact@v6
        with:
          name: primer-shard-${{ matrix.shard }}
          path: |
            /tmp/primer_shard_${{ matrix.shard }}.json
            /tmp/primer_log_${{ matrix.shard }}.txt
          retention-days: 7

  merge:
    name: Merge and summarize
    runs-on: ubuntu-latest
    needs: [primer]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: scripts/merge_primer_shards.py
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download all shards
        uses: actions/download-artifact@v6
        with:
          pattern: primer-shard-*
          path: /tmp/shards

      - name: Merge shards
        run: |
          python3 scripts/merge_primer_shards.py \
            /tmp/shards/primer-shard-0/primer_shard_0.json \
            /tmp/shards/primer-shard-1/primer_shard_1.json \
            /tmp/shards/primer-shard-2/primer_shard_2.json \
            /tmp/shards/primer-shard-3/primer_shard_3.json \
            -o /tmp/primer_errors.json
          echo "Merged size: $(du -h /tmp/primer_errors.json | cut -f1)"

      - name: Print summary
        run: |
          python3 << 'PYEOF' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          from datetime import datetime, timezone

          with open("/tmp/primer_errors.json") as f:
              data = json.load(f)

          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          projects = data["projects"]

          print(f"# Primer Comparison — {now}\n")
          print(f"**{len(projects)} projects**\n")

          # Totals
          print("| Checker | Total Errors | Clean | Crashes |")
          print("|---------|-------------|-------|---------|")
          for checker in ("pyrefly", "pyright", "mypy"):
              total = sum(p[checker]["error_count"] for p in projects if p[checker]["error_count"] > 0)
              zeros = sum(1 for p in projects if p[checker]["error_count"] == 0)
              crashes = sum(1 for p in projects if p[checker]["error_count"] < 0)
              print(f"| {checker} | {total:,} | {zeros} | {crashes} |")

          # Per-project table
          print("\n<details><summary>Per-project breakdown</summary>\n")
          print("| Project | Pyrefly | Pyright | Mypy |")
          print("|---------|---------|---------|------|")
          for p in sorted(projects, key=lambda x: x["pyrefly"]["error_count"], reverse=True):
              name = p["name"]
              pe = p["pyrefly"]["error_count"]
              pr = p["pyright"]["error_count"]
              my = p["mypy"]["error_count"]
              pe_s = "CRASH" if pe < 0 else f"{pe:,}"
              pr_s = "CRASH" if pr < 0 else f"{pr:,}"
              my_s = "CRASH" if my < 0 else f"{my:,}"
              print(f"| {name} | {pe_s} | {pr_s} | {my_s} |")
          print("\n</details>")
          PYEOF

      - name: Upload merged results
        uses: actions/upload-artifact@v6
        with:
          name: primer-results
          path: /tmp/primer_errors.json
          retention-days: 7
