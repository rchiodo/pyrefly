name: build_extension
on:
  workflow_dispatch:
  workflow_call:
    outputs:
      pyrefly_version:
        description: 'The semver version from version.bzl (e.g. 1.2.0 or 1.2.0-dev.4)'
        value: ${{ jobs.get_version.outputs.pyrefly_version }}
      marketplace_version:
        description: 'The M.m.p version published to VS Code Marketplace and Open VSX'
        value: ${{ jobs.get_version.outputs.marketplace_version }}
      prerelease_flag:
        description: '"--pre-release" if dev version, empty string otherwise'
        value: ${{ jobs.get_version.outputs.prerelease_flag }}
  push:
    paths:
      - '**/*'
      - '!.*'
      - '.github/workflows/build_extension.yml'

jobs:
  get_version:
    runs-on: ubuntu-latest
    outputs:
      pyrefly_version: ${{ steps.pyrefly-version.outputs.PYREFLY_VERSION }}
      marketplace_version: ${{ steps.pyrefly-version.outputs.MARKETPLACE_VERSION }}
      prerelease_flag: ${{ steps.pyrefly-version.outputs.PRERELEASE_FLAG }}
    steps:
      - name: Checkout repo (to see version.bzl in next step)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Get all history for all branches and tags
      - name: Get version
        id: pyrefly-version
        run: |
          # Read version.bzl's canonical semver; derive the PyPI / marketplace
          # forms via scripts/version_helpers.py (unit-tested).
          set -euo pipefail
          VERSION=$(sed -n -e 's/^VERSION = "\(.*\)"/\1/p' version.bzl)
          MARKETPLACE_VERSION=$(python3 scripts/version_helpers.py to-marketplace "$VERSION")
          if python3 scripts/version_helpers.py is-prerelease "$VERSION" >/dev/null; then
            PRERELEASE_FLAG="--pre-release"
          else
            PRERELEASE_FLAG=""
          fi
          echo "PYREFLY_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "MARKETPLACE_VERSION=$MARKETPLACE_VERSION" >> $GITHUB_OUTPUT
          echo "PRERELEASE_FLAG=$PRERELEASE_FLAG" >> $GITHUB_OUTPUT
  build_extension:
    needs: get_version
    if: ${{ success() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
            github_env: $env:GITHUB_ENV
          - os: windows-latest
            platform: win32
            arch: arm64
            github_env: $env:GITHUB_ENV
          - os: ubuntu-latest
            platform: linux
            arch: x64
            rust_target: x86_64-unknown-linux-musl
            github_env: $GITHUB_ENV
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            # necessary for glibc 2.31
            container: ubuntu:20.04
            github_env: $GITHUB_ENV
          - os: ubuntu-24.04-arm
            platform: linux
            arch: armhf
            # necessary for glibc 2.31
            container: ubuntu:20.04
            github_env: $GITHUB_ENV
          - os: ubuntu-latest
            platform: alpine
            arch: x64
            rust_target: x86_64-unknown-linux-musl
            github_env: $GITHUB_ENV
          - os: ubuntu-24.04-arm
            platform: alpine
            arch: arm64
            # necessary for glibc 2.31
            container: ubuntu:20.04
            github_env: $GITHUB_ENV
          # x86 EOL on github-actions is august 2027 according to https://github.com/actions/runner-images/issues/13046
          # we are currently cross-compiling but still running on macos-15-intel for the e2e tests. at EOL, we
          # likely need to disable the e2e test for this platform (e2e test tries starting binary on the machine).
          - os: macos-15-intel
            platform: darwin
            arch: x64
            rust_target: x86_64-apple-darwin
            github_env: $GITHUB_ENV
          - os: macos-14
            platform: darwin
            arch: arm64
            github_env: $GITHUB_ENV
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6
      - name: install toolchain dependencies
        if: ${{ matrix.container == 'ubuntu:20.04' }}
        shell: bash
        run: |
          apt-get update && apt-get -y install curl build-essential
      - uses: dtolnay/rust-toolchain@stable
      - name: set windows cargo home
        # we need to set CARGO_HOME to a high-up directory on Windows machines, since some dependencies cloned
        # by Cargo have long paths and will cause builds/tests to fail
        if: ${{ matrix.os == 'windows-latest' }}
        run: echo "CARGO_HOME=C:\\cargo" >> ${{ matrix.github_env }}
      - name: set up rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: pyrefly-extension
      - name: set jemalloc page size for ARM64 Linux
        if: ${{ matrix.arch == 'arm64' && matrix.platform == 'linux' || matrix.arch == 'arm64' && matrix.platform == 'alpine' }}
        run: echo "JEMALLOC_SYS_WITH_LG_PAGE=16" >> ${{ matrix.github_env }}
      - name: set jemalloc page size for ARM64 macOS
        if: ${{ matrix.arch == 'arm64' && matrix.platform == 'darwin' }}
        run: echo "JEMALLOC_SYS_WITH_LG_PAGE=14" >> ${{ matrix.github_env }}
      - name: build pyrefly binary (cross-compile)
        if: ${{ matrix.rust_target != '' }}
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.rust_target }}
          args: "--release --all-features --manifest-path pyrefly/Cargo.toml"
          toolchain: stable
      - name: build pyrefly binary
        if: ${{ matrix.rust_target == '' }}
        run: cargo build --release --all-features --manifest-path pyrefly/Cargo.toml
      - name: copy binary to lsp/bin
        shell: bash
        run: |
          mkdir -p lsp/bin
          if [ -n "${{ matrix.rust_target }}" ]; then
            src="target/${{ matrix.rust_target }}/release"
          else
            src="target/release"
          fi
          if [ "${{ matrix.platform }}" = "win32" ]; then
            cp "$src/pyrefly.exe" lsp/bin/
          else
            cp "$src/pyrefly" lsp/bin/
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: save platform name
        run: echo "platform=${{ matrix.platform }}-${{ matrix.arch }}" >> ${{ matrix.github_env }}
      - run: npm ci
        working-directory: lsp/
      - run: npx vsce package --target ${{ env.platform }} ${{ needs.get_version.outputs.prerelease_flag }} ${{needs.get_version.outputs.marketplace_version}}
        working-directory: lsp/
      - uses: actions/upload-artifact@v6
        with:
          name: pyrefly-${{ env.platform }}
          path: "lsp/*.vsix"
