name: deploy_extension
on:
  push:
    paths:
      - version.bzl
    branches: [ main, 'release/**' ]
  workflow_dispatch:

jobs:
    check_publish:
        uses: ./.github/workflows/check_publish.yml

    build:
        needs: check_publish
        if: needs.check_publish.outputs.should_publish == 'true'
        uses: ./.github/workflows/build_extension.yml

    test:
        needs: check_publish
        if: needs.check_publish.outputs.should_publish == 'true'
        uses: ./.github/workflows/pyrefly.yml

    publish_code_marketplace:
        runs-on: ubuntu-latest
        needs:
          - build
          - test
        if: ${{ success() }}
        steps:
            - name: upload
              uses: actions/download-artifact@v7
            - name: publish
              run: npx @vscode/vsce publish ${{ needs.build.outputs.prerelease_flag }} --skip-duplicate --packagePath $(find . -iname '*.vsix')
              env:
                VSCE_PAT: ${{ secrets.VSCE_PAT }}

    publish_openvsx:
        runs-on: ubuntu-latest
        needs:
          - build
          - test
        if: ${{ success() }}
        steps:
            - name: upload
              uses: actions/download-artifact@v7
            - name: publish
              shell: bash
              run: |
                set -euo pipefail

                shopt -s nullglob
                packages=(./*/*.vsix)
                if [ "${#packages[@]}" -eq 0 ]; then
                  echo "No VSIX packages found"
                  exit 1
                fi

                for attempt in 1 2 3; do
                  if npx ovsx publish ${{ needs.build.outputs.prerelease_flag }} --skip-duplicate --packagePath "${packages[@]}"; then
                    exit 0
                  fi

                  if [ "$attempt" -eq 3 ]; then
                    exit 1
                  fi

                  sleep_seconds=$((30 * (2 ** (attempt - 1))))
                  echo "OpenVSX publish failed; retrying in ${sleep_seconds}s"
                  sleep "$sleep_seconds"
                done
              env:
                OVSX_PAT: ${{ secrets.OPENVSX_TOKEN }}
