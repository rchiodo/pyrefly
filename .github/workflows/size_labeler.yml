name: Label PR size

on: [pull_request_target]

permissions: {}

jobs:
  labeler:
    permissions:
      pull-requests: write
      contents: read
      issues: write
    runs-on: ubuntu-latest
    name: Label the PR size
    steps:
      - uses: codelytv/pr-size-labeler@4ec67706cd878fbc1c8db0a5dcd28b6bb412e85a # v1
        with:
          xs_label: 'size/xs'
          xs_max_size: '25'
          s_label: 'size/s'
          s_max_size: '75'
          m_label: 'size/m'
          m_max_size: '150'
          l_label: 'size/l'
          l_max_size: '300'
          xl_label: 'size/xl'
          fail_if_xl: 'false'
          files_to_ignore: |
            ^test/
            ^website/
            ^pyrefly/lib/test/
          ignore_line_deletions: 'true'
          ignore_file_deletions: 'true'
