# @generated by autocargo from //pyrefly/pyrefly:[pyrefly,pyrefly_laziness_tests,pyrefly_library,pyrefly_lsp_interaction_tests]

[package]
name = "pyrefly"
version = "1.1.1"
authors = ["Meta"]
edition = "2024"
repository = "https://github.com/facebook/pyrefly"
license = "MIT"
build = "test_laziness/build.rs"

[lib]
path = "lib/lib.rs"

[[bin]]
name = "pyrefly"
path = "bin/main.rs"

[[test]]
name = "pyrefly_laziness_tests"
path = "test_laziness/mod.rs"

[[test]]
name = "pyrefly_lsp_interaction_tests"
path = "lib/test/lsp/lsp_interaction/mod.rs"

[dependencies]
anstream = "0.6.11"
anyhow = "1.0.102"
arc-swap = { version = "1.9.0", features = ["weak"] }
blake3 = { version = "=1.8.2", features = ["mmap", "rayon", "traits-preview"] }
capnp = "0.25.5"
clap = { version = "4.6.0", features = ["cargo", "derive", "env", "string", "unicode", "wrap_help"] }
crossbeam-channel = "0.5.15"
dashmap = { version = "6.2.1", features = ["rayon", "serde"] }
dupe = "0.9.1"
enum-iterator = "2.3.0"
faster-hex = "0.6.1"
fuzzy-matcher = "0.3.7"
fxhash = "0.2.1"
indicatif = { version = "0.18.4", features = ["futures", "improved_unicode", "rayon", "tokio"] }
itertools = "0.15.0"
lsp-server = "0.7.9"
lsp-types = { git = "https://github.com/yangdanny97/lsp-types", rev = "395d6bfcd6c3696a64cfe9cd93b86f981fb85112" }
num-traits = { version = "0.2.19", default-features = false }
parse-display = "0.8.2"
paste = "1.0.14"
percent-encoding = "2.1"
pyrefly_build = { path = "../crates/pyrefly_build" }
pyrefly_bundled = { path = "../crates/pyrefly_bundled" }
pyrefly_config = { path = "../crates/pyrefly_config" }
pyrefly_derive = { path = "../crates/pyrefly_derive" }
pyrefly_graph = { path = "../crates/pyrefly_graph" }
pyrefly_python = { path = "../crates/pyrefly_python" }
pyrefly_types = { path = "../crates/pyrefly_types" }
pyrefly_util = { path = "../crates/pyrefly_util" }
rayon = "1.11.0"
regex = "1.12.4"
ruff_annotate_snippets = { git = "https://github.com/astral-sh/ruff/", rev = "db5aa0a5f1b92cb91d910bf0866a967554dd94f5" }
ruff_notebook = { git = "https://github.com/astral-sh/ruff/", rev = "db5aa0a5f1b92cb91d910bf0866a967554dd94f5" }
ruff_python_ast = { git = "https://github.com/astral-sh/ruff/", rev = "db5aa0a5f1b92cb91d910bf0866a967554dd94f5", features = ["serde"] }
ruff_python_parser = { git = "https://github.com/astral-sh/ruff/", rev = "db5aa0a5f1b92cb91d910bf0866a967554dd94f5" }
ruff_source_file = { git = "https://github.com/astral-sh/ruff/", rev = "db5aa0a5f1b92cb91d910bf0866a967554dd94f5" }
ruff_text_size = { git = "https://github.com/astral-sh/ruff/", rev = "db5aa0a5f1b92cb91d910bf0866a967554dd94f5" }
serde = { version = "1.0.219", features = ["derive", "rc"] }
serde_json = { version = "1.0.140", features = ["alloc", "float_roundtrip", "raw_value", "unbounded_depth"] }
serde_repr = "0.1.14"
starlark_map = "0.14.2"
static_assertions = "1.1.0"
tempfile = "3.27.0"
thin-vec = "0.2.18"
tokio = { version = "1.52.3", features = ["macros", "rt"] }
toml = { version = "1.1.2", features = ["preserve_order"] }
tracing = { version = "0.1.41", features = ["attributes", "valuable"] }
tsp_types = { path = "../crates/tsp_types" }
uuid = { version = "1.17", features = ["js", "rng-getrandom", "v4"] }
vec1 = { version = "1.12.1", features = ["serde"] }
web-time = "1.1.0"
xxhash-rust = { version = "0.8.15", features = ["xxh64"] }
yansi = { version = "1.0.0-rc.1", features = ["hyperlink"] }

[dev-dependencies]
pretty_assertions = { version = "1.4.1", features = ["alloc"], default-features = false }

[target.'cfg(any(target_os = "linux", target_os = "macos"))'.dependencies]
backtrace-on-stack-overflow = { version = "0.3", optional = true }
tikv-jemallocator = "0.6.0"

[target.'cfg(target_os = "windows")'.dependencies]
mimalloc = { version = "0.1.46", default-features = false }

[features]
debug-stack-overflow = ["dep:backtrace-on-stack-overflow"]
default = []

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(fbcode_build)"]}
